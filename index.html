<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ═══ PWA META TAGS ═══ -->
    <meta name="application-name" content="SignalPulse Pro" />
    <meta name="description" content="AI-powered crypto trading signals. Real-time BUY, EXIT, and HODL signals powered by Claude AI." />
    <meta name="theme-color" content="#6366F1" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ═══ APPLE / iOS META TAGS ═══ -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SignalPulse" />

    <!-- Apple touch icons (iOS uses these for Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96"   href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Apple splash screens (optional but nice) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ═══ OPEN GRAPH (for sharing) ═══ -->
    <meta property="og:title" content="SignalPulse Pro" />
    <meta property="og:description" content="AI-powered crypto trading signals — BUY, EXIT, HODL in real time." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- ═══ PWA MANIFEST ═══ -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />

    <title>SignalPulse Pro</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ═══ SERVICE WORKER REGISTRATION ═══ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
